<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- — Google Font: “Patrick Hand” (hand-drawn style) — -->
  <link
    href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap"
    rel="stylesheet"
  />

  <!-- Optional: other CSS you already have (Bootstrap, your own CSS, etc.) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-ENjdO4Dr2bkBIFxQpeoQCm72Yw3OZg5FQYQ8RSKfm2Ob5QWPGFN9MuhOf23Q9Ifjh"
    crossorigin="anonymous"
  />

  <title>{% block title %}Email Follow-Up{% endblock %}</title>

  <style>
    /* — Apply “Patrick Hand” as your default font — */
    body {
      font-family: 'Patrick Hand', cursive;
      background-color: #faf9f6; /* a soft ivory if you like */
      color: #333333;
    }

    /* — Hero banner container — */
    header.site-header {
      background: url("{{ url_for('static', filename='img/hero_banner.png') }}")
                  no-repeat center center;
      background-size: cover;
      min-height: 240px; /* adjust the height as needed */
    }
  </style>
</head>
<body>
  <!-- ==================== Hero Banner ==================== -->
  <header class="site-header"></header>

  <!-- ==================== Navbar / Flash / Content etc. ==================== -->
  <nav class="navbar navbar-light bg-white shadow-sm mb-4">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('main.home') }}">
        Email Follow-Up
      </a>
      <!-- … your nav items … -->
    </div>
  </nav>

  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="alert"
              aria-label="Close">
            </button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <!-- Optional: Bootstrap JS (if you need it) -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+AMvyTG2f0ADjF0M/pW10uWvCWPIPm49"
    crossorigin="anonymous">
  </script>
</body>
</html>
